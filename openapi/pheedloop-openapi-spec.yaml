                  type: string
                  description: Event code.
                attendee_codes:
                  type: array
                  items:
                    type: string
                  description: Codes of attendees to send the announcement to.
                should_release:
                  type: boolean
                  description: If true, marks the announcement as released after sending.
                  default: false
                force_send:
                  type: boolean
                  description: If true, sends regardless of attendee opt-out status.
