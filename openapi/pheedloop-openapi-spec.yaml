  /organization/{organizationCode}/events/{eventCode}/resthooks/:
    post:
      summary: Create REST hook
      description: 'Subscribes an endpoint to a PheedLoop platform event.

        When the specified action occurs, PheedLoop will send an

        HTTP POST request to the provided endpoint URL.


        ### Supported actions

        | Action | Description |

        |---|---|

        | `registration.created` | A new registration is completed |

        | `attendee.updated` | An attendee record is modified |

        | `session.created` | A session is added to the event |

        | `checkin.created` | An attendee checks in |

        '
      operationId: createRestHook
      tags:
      - REST Hooks
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestHookWrite'
            examples:
              sample_rest_hook:
                value:
                  action: registration.created
                  endpoint: https://hooks.zapier.com/hooks/catch/example/
      responses:
