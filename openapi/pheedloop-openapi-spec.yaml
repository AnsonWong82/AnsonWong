openapi: 3.1.0
info:
  title: PheedLoop API
  version: 3.3.0
  summary: Unoffical OpenAPI specification for interacting with the PheedLoop REST
    API. This API enables access to event management data including events, attendees,
    registrations, and more. This OpenAPI specification document is not associated
    with PheedLoop in any matter and is only used as part of my work portfolio. If
    you are looking to test this code directly, simply copy and paste this entire
    code into https://editor.swagger.io/
  description: 'The **PheedLoop API** (v3) enables programmatic access to the

    PheedLoop event management platform. It supports full CRUD

    operations across the core PheedLoop data model, including:


    - **Events** — retrieve and update event configuration

    - **Attendees & Members** — create, update, delete, and bulk-manage contacts

    - **Sessions** — manage the event agenda, formats, and session registrations

    - **Exhibitors & Sponsors** — manage company profiles, booths, tiers, and promotions

    - **Speakers** — manage speaker profiles and tagging

    - **Announcements** — create and distribute communications to targeted audiences

    - **Registrations & Tickets** — read registration and ticket purchase data

    - **Reports** — retrieve paginated report data exports

    - **REST Hooks** — subscribe to platform webhook events


    ### Authentication

    All requests must include two custom headers:


    | Header | Description |

    |---|---|

    | `X-API-KEY` | Your organization''s API key |

    | `X-API-SECRET` | Your organization''s API secret |


    API credentials are generated from within the PheedLoop dashboard

    under **Settings → Integrations → API**.


    ### Base URL structure

    All endpoints follow the pattern:

    ```

    https://develop.pheedloop.com/api/v3/organization/{organizationCode}/...

    ```


    ### Pagination

    List endpoints support `page` and `page_size` query parameters.

    Responses include `count`, `next`, and `previous` fields for

    cursor-based navigation.


    ### Bulk operations

    Several resources support bulk create and bulk update via

    dedicated endpoints that accept a JSON array as the request body.


    ### Notes on this specification

    This OpenAPI 3.1.0 specification was authored by Anson Lau based

    on the PheedLoop Postman collection (v3.3.0). It documents the

    publicly available API as part of a technical writing portfolio.

    It is not an official PheedLoop publication.

    '
  contact:
    name: PheedLoop Support
    url: https://help.pheedloop.com
    email: support@pheedloop.com
  termsOfService: https://pheedloop.com/terms
servers:
- url: https://develop.pheedloop.com/api/v3
  description: PheedLoop production API server (v3)
paths:
  /organization/{organizationCode}/validateauth/:
    get:
      summary: Validate authentication credentials
      description: 'Verifies that the supplied `X-API-KEY` and `X-API-SECRET`

        headers are valid for the given organization. Returns the

        organization name and code on success.

        '
      operationId: validateAuth
      tags:
      - Authentication
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      responses:
        '200':
          description: Credentials are valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization_name:
                    type: string
                    examples:
                    - Acme Events Inc.
                  response:
                    type: string
                    examples:
                    - Authentication successful.
                  organization_code:
                    type: string
                    examples:
                    - ORGABCDE12345
        '403':
          $ref: '#/components/responses/Forbidden'
  /organization/{organizationCode}/events/:
    get:
      summary: List events
      description: Returns all events associated with the organization.
      operationId: listEvents
      tags:
      - Events
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/pageSize'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated list of events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organization/{organizationCode}/events/{eventCode}/:
    get:
      summary: Get single event
      description: Returns the full details of a single event.
      operationId: getEvent
      tags:
      - Events
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Event object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update event
      description: 'Updates one or more fields on an existing event.

        Partial updates are supported — only include the fields

        you wish to change.

        '
      operationId: updateEvent
      tags:
      - Events
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                custom_fields:
                  type: object
                  description: Key-value pairs for custom event fields.
                  examples:
                  - {}
      responses:
        '200':
          description: Updated event object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organization/{organizationCode}/events/{eventCode}/attendees/:
    post:
      summary: Create attendee
      description: 'Creates a single attendee and registers them to the event.

        Optionally sends a welcome email to the attendee''s address.

        '
      operationId: createAttendee
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeWrite'
            examples:
              sample_attendee:
                value:
                  email: jeffbezos@amazon.com
                  first_name: Jeff
                  last_name: Bezos
                  about: CEO and space traveller.
                  title: CEO & Space Tourist
                  organization: Amazon
                  address_line_1: 440 Terry Avenue North
                  address_city: Seattle
                  address_state: WA
                  address_zip: '98109'
                  address_country: United States
                  address_phone: 206-266-1000
                  dietary_restrictions: Vegan
                  designations: He/Him
                  send_app_welcome_email: true
                  send_attendee_portal_welcome: true
                  tags:
                  - TAGJFOPSTYT
      responses:
        '201':
          description: Attendee created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: List attendees
      description: Returns all attendees registered to the event.
      operationId: listAttendees
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/pageSize'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated list of attendees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttendeeList'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organization/{organizationCode}/events/{eventCode}/attendeesbulk/:
    post:
      summary: Bulk create attendees
      description: 'Creates multiple attendees in a single request.

        The request body must be a JSON array of attendee objects.

        Returns an array of created attendee records.

        '
      operationId: bulkCreateAttendees
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttendeeWrite'
      responses:
        '201':
          description: Attendees created successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      summary: Bulk update attendees
      description: 'Updates multiple attendees in a single request.

        Each object in the array must include the attendee `code`.

        '
      operationId: bulkUpdateAttendees
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                allOf:
                - $ref: '#/components/schemas/AttendeeWrite'
                - type: object
                  required:
                  - code
                  properties:
                    code:
                      type: string
                      description: Unique attendee code to identify the record to
                        update.
      responses:
        '200':
          description: Attendees updated successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Bulk delete attendees
      description: Deletes multiple attendees by code.
      operationId: bulkDeleteAttendees
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - name: codes
        in: query
        required: true
        description: Comma-separated list of codes to delete.
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      responses:
        '204':
          description: Attendees deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'
  /organization/{organizationCode}/events/{eventCode}/attendees/{attendeeCode}/:
    get:
      summary: Get single attendee
      description: Returns the full record for a single event attendee.
      operationId: getAttendee
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/attendeeCode'
      - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Attendee object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendee'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update attendee
      description: Partially updates a single attendee record.
      operationId: updateAttendee
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/attendeeCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeWrite'
      responses:
        '200':
          description: Updated attendee object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Delete attendee
      description: Permanently deletes a single attendee from the event.
      operationId: deleteAttendee
      tags:
      - Attendees
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/attendeeCode'
      responses:
        '204':
          description: Attendee deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /organization/{organizationCode}/events/{eventCode}/attendance/:
    get:
      summary: Get event attendance
      description: Returns check-in and check-out records for the event.
      operationId: getEventAttendance
      tags:
      - Event Attendance
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      responses:
        '200':
          description: Attendance records
          content:
            application/json:
              schema:
                type: object
  /organization/{organizationCode}/events/{eventCode}/checkin/:
    post:
      summary: Check in attendee(s)
      description: 'Marks one or more attendees as checked in to the event.

        Accepts an array of attendee codes.

        '
      operationId: eventCheckIn
      tags:
      - Event Attendance
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - codes
              properties:
                codes:
                  type: array
                  items:
                    type: string
                  description: Attendee codes to check in.
                  examples:
                  - - ATTABC123
      responses:
        '200':
          description: Check-in recorded
        '400':
          $ref: '#/components/responses/BadRequest'
  /organization/{organizationCode}/events/{eventCode}/checkout/:
    delete:
      summary: Check out attendee(s)
      description: Marks one or more attendees as checked out of the event.
      operationId: eventCheckOut
      tags:
      - Event Attendance
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - name: codes
        in: query
        required: true
        description: Comma-separated list of codes to delete.
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      responses:
        '200':
          description: Check-out recorded
  /organization/{organizationCode}/events/{eventCode}/sessions/:
    post:
      summary: Create session
      description: Creates a new agenda session for the event.
      operationId: createSession
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionWrite'
            examples:
              sample_session:
                value:
                  title: Opening Keynote
                  sub_title: The future of event technology
                  about: A deep dive into event tech trends for 2025.
                  location: Main Hall
                  session_date: '2025-09-15'
                  start_time: 09:00:00
                  end_time: '10:00:00'
                  credit_value: 1.0
                  is_channel: false
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      summary: List sessions
      description: Returns all sessions for the event.
      operationId: listSessions
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/pageSize'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated list of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSessionList'
  /organization/{organizationCode}/events/{eventCode}/sessions/{sessionCode}/:
    get:
      summary: Get single session
      description: Returns the full record for a single session.
      operationId: getSession
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: Session object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update session
      description: Partially updates a session record.
      operationId: updateSession
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionWrite'
      responses:
        '200':
          description: Updated session object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      summary: Delete session
      description: Permanently deletes a session.
      operationId: deleteSession
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      responses:
        '204':
          description: Session deleted
  /organization/{organizationCode}/events/{eventCode}/sessions/{sessionCode}/attendance/:
    post:
      summary: Add session registration
      description: Registers one or more attendees to a session.
      operationId: addSessionRegistration
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - codes
              properties:
                codes:
                  type: array
                  items:
                    type: string
                  description: Attendee codes to register to this session.
      responses:
        '201':
          description: Session registrations added
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get session registrations
      description: Returns all attendee registrations for a session.
      operationId: getSessionRegistrations
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      responses:
        '200':
          description: Session registration list
          content:
            application/json:
              schema:
                type: object
    patch:
      summary: Bulk edit session registrations
      description: Updates registrations for multiple attendees on a session.
      operationId: bulkEditSessionRegistrations
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - codes
              properties:
                codes:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Session registrations updated
    delete:
      summary: Bulk delete session registrations
      description: Removes multiple attendees from a session.
      operationId: bulkDeleteSessionRegistrations
      tags:
      - Sessions
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/sessionCode'
      - name: codes
        in: query
        required: true
        description: Comma-separated list of codes to delete.
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
      responses:
        '204':
          description: Session registrations removed
  /organization/{organizationCode}/events/{eventCode}/sessions/formats/:
    post:
      summary: Create session format
      description: Creates a session format label (e.g., Workshop, Panel, Keynote).
      operationId: createSessionFormat
      tags:
      - Session Formats
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionFormatWrite'
            examples:
              sample_session_format:
                value:
                  title: Workshop
                  color: '#007bff'
      responses:
        '201':
          description: Session format created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionFormat'
    get:
      summary: List session formats
      description: Returns all session formats for the event.
      operationId: listSessionFormats
      tags:
      - Session Formats
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      responses:
        '200':
          description: List of session formats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionFormat'
  /organization/{organizationCode}/events/{eventCode}/sessions/formats/{formatCode}/:
    get:
      summary: Get single session format
      operationId: getSessionFormat
      tags:
      - Session Formats
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/formatCode'
      responses:
        '200':
          description: Session format object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionFormat'
    patch:
      summary: Update session format
      operationId: updateSessionFormat
      tags:
      - Session Formats
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/formatCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionFormatWrite'
      responses:
        '200':
          description: Updated session format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionFormat'
    delete:
      summary: Delete session format
      operationId: deleteSessionFormat
      tags:
      - Session Formats
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/formatCode'
      responses:
        '204':
          description: Session format deleted
  /organization/{organizationCode}/events/{eventCode}/speakers/:
    post:
      summary: Create speaker
      description: Creates a speaker profile for the event.
      operationId: createSpeaker
      tags:
      - Speakers
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerWrite'
            examples:
              sample_speaker:
                value:
                  first_name: Tim
                  last_name: Cook
                  email: timcook@apple.com
                  title: CEO
                  about: CEO of Apple
                  organization: Apple
                  location: Cupertino
                  designations: He/Him
      responses:
        '201':
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
    get:
      summary: List speakers
      description: Returns all speakers for the event.
      operationId: listSpeakers
      tags:
      - Speakers
      security:
      - ApiKeyAuth: []
      parameters:
      - $ref: '#/components/parameters/organizationCode'
      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/fields'
      - $ref: '#/components/parameters/pageSize'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Paginated list of speakers
          content:
