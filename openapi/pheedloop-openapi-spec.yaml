security:
- ApiKeyAuth: []
  ApiSecretAuth: []
tags:
- name: Authentication
  description: Validate API credentials before making requests.
- name: Events
  description: Retrieve and update event configuration and details.
- name: Attendees
  description: Create, read, update, and delete event attendees. Supports single and
    bulk operations.
- name: Event Attendance
  description: Manage attendee check-in and check-out records for an event.
- name: Sessions
  description: 'Manage the event agenda: sessions, registrations, and session-level
    attendance.'
- name: Session Formats
  description: Define session format labels (e.g., Workshop, Panel, Keynote) with
    associated colors for display.
- name: Speakers
  description: Manage speaker profiles and their session assignments.
- name: Speaker Tags
  description: Create and manage tags applied to speaker profiles.
- name: Exhibitors
  description: Manage exhibiting company profiles and their booth assignments.
- name: Exhibitor Booths
  description: Manage booth records for exhibitors.
- name: Sponsors
  description: Manage sponsor company profiles and tier assignments.
- name: Sponsor Tiers
  description: Define sponsorship tiers (e.g., Gold, Silver, Bronze) with colors.
- name: Announcements
  description: Create and distribute announcements at the event or organization level
    via email and push notification.
- name: Tags
  description: Read event-level tags for filtering and categorization.
- name: Registrations
  description: Read registration and ticket purchase records.
- name: Tickets
  description: Read ticket type definitions.
- name: Ticket Transfer Logs
  description: Read logs of ticket ownership transfers.
- name: Surcharges
  description: Read event surcharge configurations.
- name: Promotions
  description: Read promotional code definitions for registrations, exhibitors, and
    sponsors.
- name: Members
  description: Manage organization-level member contacts. Supports single and bulk
    operations, plus email-to-code conversion.
- name: Memberships
  description: Manage membership records, including assignment to members.
- name: Member Organizations
  description: Manage company/organization records within the membership system.
- name: Reports
  description: Retrieve paginated data exports from pre-configured reports.
- name: REST Hooks
  description: Subscribe external endpoints to PheedLoop platform events. Webhooks
    are scoped per event.
externalDocs:
  description: PheedLoop API reference and developer documentation
  url: https://develop.pheedloop.com/docs/

