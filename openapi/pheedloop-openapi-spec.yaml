      - $ref: '#/components/parameters/eventCode'
      - $ref: '#/components/parameters/restHookCode'
      responses:
        '204':
          description: REST hook deleted
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: 'Your organization''s API key. Must be sent alongside

        `X-API-SECRET` on every request.

        '
    ApiSecretAuth:
      type: apiKey
      in: header
      name: X-API-SECRET
      description: 'Your organization''s API secret. Must be sent alongside

        `X-API-KEY` on every request.

        '
  parameters:
    organizationCode:
      name: organizationCode
      in: path
      required: true
      description: Unique alphanumeric code identifying your PheedLoop organization.
        Found in your dashboard URL and API settings.
      schema:
        type: string
      examples:
        sample_organization_code:
          value: ORGABCDE12345
    eventCode:
      name: eventCode
      in: path
      required: true
      description: Unique code identifying a specific event within the organization.
      schema:
        type: string
      examples:
        sample_event_code:
          value: EVETBCXWNLKBO
    attendeeCode:
      name: attendeeCode
      in: path
      required: true
      description: Unique code identifying an attendee.
      schema:
        type: string
      examples:
        sample_attendee_code:
          value: ATTWFKEQ75Q9D68SYNO333VZ0TG8
    sessionCode:
      name: sessionCode
      in: path
      required: true
      description: Unique code identifying a session.
      schema:
        type: string
      examples:
        sample_session_code:
          value: SES160BYRC13RHLX4
    speakerCode:
      name: speakerCode
      in: path
      required: true
      description: Unique code identifying a speaker.
      schema:
        type: string
    speakerTagCode:
      name: speakerTagCode
      in: path
      required: true
      description: Unique code identifying a speaker tag.
      schema:
        type: string
    exhibitorCode:
      name: exhibitorCode
      in: path
      required: true
      description: Unique code identifying an exhibitor.
      schema:
        type: string
    boothCode:
      name: boothCode
      in: path
      required: true
      description: Unique code identifying an exhibitor booth.
      schema:
        type: string
      examples:
        sample_booth_code:
          value: EXHBOTHMIDYBXO7PVMZ2
    sponsorCode:
      name: sponsorCode
      in: path
      required: true
      description: Unique code identifying a sponsor.
      schema:
        type: string
    sponsorTierCode:
      name: sponsorTierCode
      in: path
      required: true
      description: Unique code identifying a sponsor tier.
      schema:
        type: string
    announcementCode:
      name: announcementCode
      in: path
      required: true
      description: Unique code identifying an event announcement.
      schema:
        type: string
    organizationAnnouncementCode:
      name: organizationAnnouncementCode
      in: path
      required: true
      description: Unique code identifying an organization-level announcement.
      schema:
        type: string
    formatCode:
      name: formatCode
      in: path
      required: true
      description: Unique code identifying a session format.
      schema:
        type: string
    memberCode:
      name: memberCode
      in: path
      required: true
      description: Unique code identifying a member.
      schema:
        type: string
    membershipCode:
      name: membershipCode
      in: path
      required: true
      description: Unique code identifying a membership record.
      schema:
        type: string
    memberOrganizationCode:
      name: memberOrganizationCode
      in: path
      required: true
      description: Unique code identifying a member organization.
      schema:
        type: string
    restHookCode:
      name: restHookCode
      in: path
      required: true
      description: Unique code identifying a REST hook subscription.
      schema:
        type: string
    fields:
      name: fields
      in: query
      required: false
      description: Comma-separated list of fields to include in the response. When
        omitted, all available fields are returned.
      schema:
        type: string
      examples:
        sample_fields:
          value: code,first_name,last_name,email
    pageSize:
      name: page_size
      in: query
      required: false
      description: Number of records to return per page. Defaults to 10.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 500
      examples:
        sample_page_size:
          value: 50
    page:
      name: page
      in: query
      required: false
      description: Page number to retrieve. Starts at 1.
      schema:
        type: integer
        default: 1
        minimum: 1
      examples:
        sample_page:
          value: 1
  responses:
    BadRequest:
      description: Bad request — one or more request parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden — invalid or missing API credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            sample_forbidden:
              value:
                detail: Authentication credentials were not provided.
    NotFound:
      description: Not found — the requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            sample_not_found:
              value:
                detail: Not found.
  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error description.
          examples:
          - Authentication credentials were not provided.
    PaginatedResponse:
      type: object
      properties:
        count:
          type: integer
          description: Total number of records matching the query.
        next:
          type:
          - string
          - 'null'
          description: URL for the next page of results, or null if on the last page.
        previous:
          type:
          - string
          - 'null'
          description: URL for the previous page of results, or null if on the first
            page.
